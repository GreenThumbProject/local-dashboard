server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # API requests proxy to the Pi API container
    location ~ ^/(state|data|settings|video|camera|measurement|actuator)(/|$) {
        proxy_pass http://api:8080;
        proxy_set_header Host $host;
        proxy_buffering off;
    }

    # MJPEG stream — disable buffering for real-time video
    location /video/ {
        proxy_pass http://api:8080;
        proxy_buffering off;
        proxy_cache off;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
